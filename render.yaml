services:
  - type: web
    name: pulsemsme-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PREFERRED_LLM_PROVIDER
        value: gemini
    healthCheckPath: /api/config
